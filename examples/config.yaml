# KronoKube — sample config.
#
# Every field is optional. CLI flags override values here.

# Snapshot cadence. Default 30s.
interval: 30s

# kubeconfig context to bind this recording to. Defaults to the current context.
# context: my-cluster

# Path to kubeconfig. Defaults to $KUBECONFIG or ~/.kube/config.
# kubeconfig: /home/me/.kube/config

# Default output file. Overridden by --out on the CLI.
# output: ./incident-2026-05-12.kk

# Namespaces to capture. Empty list = all accessible namespaces.
# include_namespaces:
#   - default
#   - my-app

# Namespaces to skip (applied after include_namespaces).
# exclude_namespaces:
#   - kube-system

# Which resource kinds to capture. Accepts a preset name OR a comma-separated
# list. Presets:
#   minimal    pods, deployments, statefulsets, services, events
#   default    everything in the catalog except endpointslices and replicasets
#              (the two kinds that scale fastest with cluster size)
#   workloads  pods + the pod-producing controllers
#   full       every kind in the catalog
# Short names ("deployments" for "deployments.apps") are accepted.
# kinds: default

# Drop kinds from the resolved set above. Applied after `kinds`.
# exclude_kinds:
#   - events
#   - endpointslices

# Label selector passed as `-l` to every `kubectl get`. Applied uniformly
# across all captured kinds. Empty = no selector.
# selector: app=api,tier!=batch

# Pod log capture. OFF by default — logs can be large and may contain
# sensitive data. When enabled, KronoKube runs
#   kubectl logs <pod> -n <ns> --all-containers=true --prefix=true --tail=N
# for every captured pod, after the structured snapshot pass.
#
# pod_logs:
#   enabled: true
#   tail_lines: 100          # per-container tail (default 100)
#   per_pod_timeout: 5s      # bound a single log fetch (default 5s)
